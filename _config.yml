# Site Settings
title: 'Busta Games'
description: >-
  Published games from Busta Games with store links across supported platforms.
url: https://busta.games

# Build Settings
permalink: "/blog/:year/:month/:day/:title/"
sass:
  sass_dir: "_sass"
  style: compressed

# Collection Settings
collections:
  games:
    output: true

defaults:
- scope:
    path: ""
    type: "games"
  values:
    permalink: "/:slug"

# Plugin Settings
highlighter: rouge
