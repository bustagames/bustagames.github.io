---
layout: compress
---
<!doctype html>
<html lang="en">
{% include head.html %}
<body class="rb-redirect-page">
    <script>
        const androidUrl = "{{ page.android-url }}";
        const iosUrl = "{{ page.ios-url }}";
        const pcUrl = "{{ page.steam-url }}";
        const webUrl = "{{ page.web-url }}";

        function detectPlatform() {
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            if (/android/i.test(ua)) return "android";
            if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) return "ios";
            return "pc";
        }

        function loadIcon() {
            const img = document.createElement("img");
            img.src = "/assets/games/{{ page.slug }}/app-icon.webp";
            img.alt = "{{ page.title }} Icon";
            img.className = "rb-app-icon";
            return img;
        }

        function fallback() {
            document.getElementById("links").prepend(loadIcon());
            document.querySelector(".rb-redirect-body").style.display = "flex";
        }

        function forceFallback() {
            const params = new URLSearchParams(window.location.search);
            return params.has("links");
        }

        function redirectIfAvailable() {
            if (forceFallback()) {
                fallback();
                return;
            }

            const platform = detectPlatform();
            let target = "";

            if (platform === "android" && androidUrl) target = androidUrl;
            else if (platform === "ios" && iosUrl) target = iosUrl;
            /*
            else if (platform === "pc" && pcUrl) target = pcUrl;
            else if (webUrl) target = webUrl;
            */

            if (target) {
                location.replace(target);
            } else {
                fallback();
            }
        }

        window.onload = redirectIfAvailable;
    </script>
<main class="rb-redirect-body" style="display: none">
    <div id="links" class="rb-redirect-card">
        <h1 class="rb-redirect-card__title">{{ page.title }}</h1>
        <p class="rb-redirect-card__body">{{ page.description | default: content | strip_html | normalize_whitespace }}</p>
        {% include platform-buttons.html game=page %}
    </div>
</main>
</body>
</html>
