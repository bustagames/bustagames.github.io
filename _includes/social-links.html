{% assign social_links = include.links | default: site.data.company.social_links %}
{% for item in social_links %}
<a class="rb-social-link" href="{{ item.href }}" target="_blank" rel="noreferrer" aria-label="{{ item.label }}" title="{{ item.label }}">
    <span uk-icon="icon: {{ item.icon }}"></span>
</a>
{% endfor %}
